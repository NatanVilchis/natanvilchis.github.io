<html>
<head>
  <title></title>
</head>
  
  <!-- The text field -->
  Seed: 
  <input type="password"   id="seed">
  <br>

  m: 
  <input type="password"  id="m">
  <br>
  
  
  a: 
  <input type="password" id="a">
  <br>
  
  c: 
  <input type="password"   id="c">
  <br>

  
  steps: 
  <input type="password"  id="steps">
  <br>

  
  n: 
  <input type="password"  id="n">
  <br>

  

  
<button onclick="generateAndCopy()">Generate and copy</button>
  



<button onclick="clearCP()">Clear </button>
  
  <script>
function clearCP() {
  navigator.clipboard.writeText("")
  document.getElementById("m").value = ""
  document.getElementById("a").value = ""
  document.getElementById("c").value = ""
  document.getElementById("steps").value = ""
  document.getElementById("n").value = ""
  document.getElementById("seed").value = ""
} 
  
    function generateAndCopy() {
      var semilla = 0
      var a = 0
      var c = 0
      var m = 0
      // Get the text field
      var seed = document.getElementById("seed").value;
      var tempSeed = ""
      var nTemp = seed.length;
      for(let i=0; i<nTemp; i++){
        tempSeed += seed[i].charCodeAt();
      }
      
      
      semilla = BigInt(tempSeed)
      
      
      
      
      m = BigInt(eval(document.getElementById("m").value))
      a = BigInt(eval(document.getElementById("a").value))
      c = BigInt(eval(document.getElementById("c").value))
      steps = BigInt(eval(document.getElementById("steps").value))
      n = BigInt(eval(document.getElementById("n").value))
    
      
      var result = ""
      var tempChar = ""
      for(let i=0; i<n; i++){
        semilla = (a*semilla+c)%m
        temp_char = String.fromCharCode( parseInt(steps + BigInt(semilla.toString().substr(0,2)))  )
        result += temp_char 
      }

      
  navigator.clipboard.writeText(result);
      
setTimeout(function(){
alert() 
clearCP()

}, 3000) 

}
  </script>
</html>
